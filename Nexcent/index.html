<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexcent</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <nav id="navbar">
        <div class="wrapper">
            <div class="navbar_cont">
                <figure>
                    <img src="images/main-logo.png" alt="company logo">
                </figure>

                <div class="navbar-nav">
                    <ul>
                        <li>
                            <a href="/">Home</a>
                        </li>
                        <li>
                            <a href="/services">Services</a>
                        </li>
                        <li>
                            <a href="/feature">Feature</a>
                        </li>
                        <li>
                            <a href="/product">Product</a>
                        </li>
                        <li>
                            <a href="/testimonial">Testimonial</a>
                        </li>
                        <li>
                            <a href="/faq">FAQ</a>
                        </li>
                    </ul>
                </div>

                <div class="navbar-btn">
                    <a href="/login" class="navbar-login">Login</a>
                    <a href="/signup" class="navbar-signup">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>
    
    <div id="hero">
        <div class="wrapper">
            <div class="hero_cont">
                <div class="hero-info">
                    <h1>Lessons and insights <span>from 8 years</span></h1>
                    <p>Where to grow your business as a photographer: site or social media?</p>
                    <a href="/signup">Register</a>
                </div>

                <figure>
                    <img src="images/hero-img.png" alt="">
                </figure>
            </div>
        </div>
    </div>

    <div id="client-brands">
        <div class="wrapper">
            <div class="client_brands_cont">
                <div class="client-brands-info">
                    <h2>Our Clients</h2>
                    <p>We have been working with some Fortune 500+ clients</p>
                </div>

                <div class="client-brands-logo">
                    <figure>
                        <img src="images/client-logo1.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo2.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo3.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo4.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo5.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo6.png" alt="">
                    </figure>
                    <figure>
                        <img src="images/client-logo7.png" alt="">
                    </figure>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
